site_name: geshu-compendium
site_description: A living notebook recording my daily work progress related to AI — projects, paper notes, and reference notes.
site_url: https://angelawurx.github.io/geshu-compendium/
repo_url: https://github.com/AngelaWuRX/geshu-compendium

theme:
  name: material
  # All presentation lives under frontend/ — see frontend/README.md.
  # custom_dir supplies template overrides AND ships frontend/overrides/
  # stylesheets/extra.css into the built site (MkDocs copies non-HTML files
  # from the custom_dir), which is what `extra_css` below points at.
  custom_dir: frontend/overrides
  # No Google Fonts request (Material would load Roboto by default): the
  # stylesheet sets system font stacks, incl. CJK families for the Chinese
  # prose. Keeps the site self-contained and reader-private.
  font: false
  palette:
    # `custom` stops Material from emitting its own primary/accent colours;
    # the real palette (ported from the author's Obsidian theme) is defined
    # in frontend/overrides/stylesheets/extra.css for both schemes.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer   # prev/next pager — the notes are meant to be read in order
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search:
      # About a third of the CS notes are in Chinese. `zh` activates jieba
      # segmentation (see requirements.txt) — without it that prose is
      # effectively unsearchable, since CJK has no spaces to tokenise on.
      lang:
        - en
        - zh
  - tags

# The LeetCode problem template is an in-repo authoring aid, not a page. Exclude
# it from the build so `--strict` doesn't flag it as omitted-from-nav.
exclude_docs: |
  projects/leetcode/_template.md

nav:
  - Home: index.md
  - Projects:
      - projects/index.md
      - Building ChatGPT from Scratch: projects/chatgpt-from-scratch.md
      - Postmortem Agent: projects/postmortem-agent.md
      - LeetCode:
          - projects/leetcode/index.md
          - Two Sum: projects/leetcode/two-sum.md
          - Remove Element: projects/leetcode/remove-element.md
  - Blog: blog/index.md
  # BEGIN GENERATED NAV — scripts/sync_vault.py rewrites everything between
  - Programming:
      - Python:
          - 📖 hello-algo — Reading Notes: notes/python/hello-algo-notes.md
      - Data Structures:
          - ArrayList: notes/data-structures/arraylist.md
          - Asymptotic: notes/data-structures/asymptotic.md
          - B-Trees: notes/data-structures/b-trees.md
          - Comparison-based sort: notes/data-structures/comparison-based-sort.md
          - Data structure: notes/data-structures/data-structure.md
          - Hashing: notes/data-structures/hashing.md
          - Heap: notes/data-structures/heap.md
          - HeapSort: notes/data-structures/heapsort.md
          - InsertionSort: notes/data-structures/insertionsort.md
          - LinkedList: notes/data-structures/linkedlist.md
          - MergeSort: notes/data-structures/mergesort.md
          - OOP: notes/data-structures/oop.md
          - QuickSort: notes/data-structures/quicksort.md
          - RadixSort: notes/data-structures/radixsort.md
          - Red Black Trees: notes/data-structures/red-black-trees.md
          - Search Trees: notes/data-structures/search-trees.md
          - Sorting and Selecting: notes/data-structures/sorting-and-selecting.md
          - Union-Find (Disjoint Set): notes/data-structures/union-find-disjoint-set.md
      - Algorithms:
          - Divide and Conquer: notes/algorithms/divide-and-conquer.md
          - Graph Traversal: notes/algorithms/graph-traversal.md
          - Linear programming: notes/algorithms/linear-programming.md
          - Minimum spanning trees: notes/algorithms/minimum-spanning-trees.md
          - Optimization: notes/algorithms/optimization.md
          - Reduction: notes/algorithms/reduction.md
          - Single-source shortest paths: notes/algorithms/single-source-shortest-paths.md
          - Topological sort: notes/algorithms/topological-sort.md
  - Model:
      - Machine Learning:
          - Probability: notes/machine-learning/01-probability.md
          - MLE & MAP: notes/machine-learning/02-mle-and-map.md
          - Linear Regression & Regularization: notes/machine-learning/03-linear-regression-and-regularization.md
          - Clustering: notes/machine-learning/04-clustering.md
          - Classifiers: notes/machine-learning/05-classifiers.md
          - Optimization: notes/machine-learning/06-optimization.md
          - Neural Networks: notes/machine-learning/07-neural-networks.md
          - CNNs & ResNet: notes/machine-learning/08-cnns-and-resnet.md
          - Transformers & Attention: notes/machine-learning/09-transformers-and-attention.md
          - Language Models: notes/machine-learning/10-language-models.md
          - Self-Supervised Learning: notes/machine-learning/11-self-supervised-learning.md
  - Networks:
      - notes/networks/index.md
      - Graph Counting Tricks: notes/networks/01-graph-counting-tricks.md
      - Expected Counts and Union Bounds: notes/networks/02-expected-counts-and-union-bounds.md
      - Concentration: notes/networks/03-concentration.md
      - Configuration Model: notes/networks/04-configuration-model.md
      - Thresholds: notes/networks/05-thresholds.md
      - Giant Component: notes/networks/06-giant-component.md
      - Branching Processes: notes/networks/07-branching-processes.md
      - Diameter of the Giant Component: notes/networks/08-diameter-of-giant.md
      - Directed Networks (Digraphs, SCC, Bow-tie): notes/networks/09-directed-networks.md
      - Stochastic Block Model and Multitype Branching Process: notes/networks/10-sbm-and-multitype-bp.md
      - Small World Models: notes/networks/11-small-world.md
      - Preferential Attachment: notes/networks/12-preferential-attachment.md
      - Markov Chains, Random Walks, PageRank: notes/networks/13-markov-chains-and-pagerank.md
      - Mixing Time, Conductance, Spectral Gap: notes/networks/14-mixing-time-and-spectral-gap.md
      - Spectral Clustering and Graph Partitioning: notes/networks/15-spectral-clustering.md
      - Information Cascades and Influence Maximization: notes/networks/16-information-cascades.md
      - SIR and Epidemics: notes/networks/17-sir-and-epidemics.md
      - SIR on Networks: notes/networks/18-sir-on-networks.md
  # END GENERATED NAV

markdown_extensions:
  - toc:
      permalink: true
  - admonition          # 45 note files use Obsidian callouts
  - pymdownx.details    # collapsed `> [!question]-` -> `???`; the Q&A cards need this
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true     # 50 note files use LaTeX
  - pymdownx.mark       # 14 note files use ==highlight==
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html          # Asymptotic.md has raw <br> inside a table cell

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

# Served from frontend/overrides/stylesheets/extra.css via theme.custom_dir.
extra_css:
  - stylesheets/extra.css

copyright: Notes CC BY-NC-SA 4.0 · code MIT

# Makes `mkdocs build --strict` fail on broken relative links, which is the
# real test that the converter's wikilink resolution worked.
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

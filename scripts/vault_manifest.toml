# ─── Per-file surgery ────────────────────────────────────────────────────────

# The "HW" column indexes staff problems by number, and some row names are
# defined by them ("Multiplicative Chernov (HW7 P1)").
[[patch]]
file = "spring2026 copy/networks/Final Method Index.md"
drop_table_columns = ["HW"]
scrub_regex = ['\s*\((?:HW|hw)\s?\d+\s*P?\d*\)']

# `### Solving problems` embeds a screenshot of a course problem's answer.
[[patch]]
file = "Computer Science copy/cs61b/OOP.md"
drop_embeds = ["OOP eg answer.png"]

[[patch]]
file = "Computer Science copy/cs61b/Asymptotic.md"
drop_embeds = ["asymptotic solution.png"]


# ─── Denylist ────────────────────────────────────────────────────────────────
# A gate, not a filter. A hit anywhere stops the whole run and writes nothing.
# An include/deny intersection means the manifest is wrong; that is an error,
# not a silent skip.
[denylist]
paths = [
  # Staff / instructor material
  "spring2026 copy/networks/hw/**",
  "spring2026 copy/networks/Midterm Learning Guide.md",
  "spring2026 copy/networks/Midterm Method Index.md",
  "spring2026 copy/networks/midterm-solutions.pdf",
  "spring2026 copy/networks/lecture_notes/**",
  "spring2026 copy/machine_learning/lec/**",
  "spring2026 copy/machine_learning/hw/**",
  "spring2026 copy/machine_learning/reading/**",
  "spring2026 copy/machine_learning/Guideline.md",
  "spring2026 copy/machine_learning/hw4_written_student.tex",
  "Computer Science copy/Files/**",
  "Computer Science copy/Screenshot/OOP eg answer.png",
  "Computer Science copy/Screenshot/asymptotic solution.png",
  "Computer Science copy/Untitled.md",
  # Own work that stays private
  "python copy/application_plan/**",
  "python copy/profile_strategy.md",
  "python copy/daily_track/**",
  "python copy/00 Dashboard.md",
  "python copy/01 Sprint Plan.md",
  # Copyright
  "python copy/pdf/**",
  # Blanket
  "**/*.pdf",
  "**/*.tex",
  "**/midterm*",
  "**/*_sol*",
  "**/resume*",
]

# Regex, case-insensitive, applied to every rendered byte before any write.
# A hit reports file+line+which-pattern, never the matched text — that would
# copy the thing we're protecting into terminal scrollback and CI logs.
fail_patterns = [
  'ruoxi',
  'angela wu',
  'AngelaWuRX',
  '510[- ]?499',
  'berkeley\.edu',
  'Shixiang',
  'AgentHLE',
  'NeurIPS',
  # Deliberately broad. An earlier version matched only the "HW7 P2" shape and
  # sailed straight past "(HW3 Bonus)", "(Eq. 3 from HW5)", "(cite Lemma 7.1
  # from HW7)" and a stray "HW10/11 references" to-do. Any mention of a
  # homework or the midterm is a citation; there is no innocent use.
  '\bHW ?\d+',
  '\bmidterm\b',
  'from your (red|bottom-right|margin)',   # second-person refs to private artifacts
  'Tell me if you want',           # assistant chatter left in _ML Index
]

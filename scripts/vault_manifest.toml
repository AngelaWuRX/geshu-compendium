# What publishes, where it lands, and what must never leave the vault.
#
# This file is policy. It is meant to be read and argued with, which is why it
# lives here as data rather than as a dict inside sync_vault.py.
#
# Sections use explicit per-file include lists rather than directory globs. That
# is not fussiness: in the CS vault the folder tree contradicts the link graph
# (cs61b/Graphs.md links to Graph Traversal.md, Minimum spanning trees.md and
# Single-source shortest paths.md, all of which sit at the vault root), so a
# glob over cs61b/ would miss half the section and a glob over the root would
# sweep in a CS189 exam cram sheet.

[output]
docs_root  = "docs/notes"
assets_dir = "docs/assets/images"

[[vault]]
name = "cs"
root = "Computer Science copy"

[[vault]]
name = "python"
root = "python copy"

[[vault]]
name = "spring2026"
root = "spring2026 copy"


# ─── Networks ────────────────────────────────────────────────────────────────
# The flagship. Already in the target format: YAML frontmatter, faceted tags,
# zero wikilinks, zero embeds.
#
# The homework coupling runs deeper than the "## 7" section suggests. Of 78
# citations across the 18 notes, only 47 are in section 7. The rest:
#   - 22 lemma headings carry a pointer suffix: "### Perfect matching count (HW5 Q2)".
#     The lemma itself is textbook maths; the parenthetical is the only HW-specific
#     part, so scrubbing it leaves the content whole.
#   - 3 whole sections ARE a homework problem ("## HW8 P1: Direct (overlap-method)
#     proof..."). Those go entirely — they're per-problem walkthroughs.
#   - a handful of prose asides, incl. one pointing at a corrected HW solution.
[[section]]
title   = "Networks"
slug    = "networks"
vault   = "spring2026"
include = ["networks/topics/*.md"]

strip_headings = ["## 7. Homework examples"]

# These notes number their sections, so removing #7 leaves "1..6, 8, 9, 10" —
# a gap that advertises the removal. Renumber to run consecutively.
renumber_headings = true

# Sections whose title IS a homework problem. Prefix-matched because the title
# varies per file.
strip_heading_prefixes = ["## HW", "### HW"]

# Kill whole lines that only exist to point at homework or its solutions.
drop_lines_matching = [
  "had a typo in the original",       # "...study the corrected solution" (12 Pref Attachment)
  "HW10/11 references \\(if any\\)",  # a to-do to self, not content (08 Diameter)
]

# Where a citation is load-bearing in the sentence, deleting it leaves debris
# ("Why this is harder than." / "argument (the bulk of)"). Name the replacement
# instead of letting a regex guess. Each entry is [pattern, replacement]; the
# script warns if one stops matching, so a vault edit can't silently skip it.
rewrite = [
  ['\(the hard part, HW3 Q3 ii-v\)',        '(the hard part)'],
  ['\s*\(the bulk of HW3 Q3\)',             ''],
  ['\s*\(HW7 P2, P3\)',                     ''],
  ['\s*\(HW7 P3, HW8 P3\)',                 ''],
  ['Why this is harder than HW7 P2\.',      'Why this is harder than the plain giant-component argument.'],
  ['\(final outbreak size, HW7 P3 bonus\)', '(final outbreak size)'],
  ['Proof: repeat HW7 P2 \(iv\)',           'Proof: repeat the giant-component argument (iv)'],
  ['\s*\(HW7 P3 — Lemma 7\.2\)',            ''],
  ['or the corrected HW5 Q3\(iv\) approach ', ''],
  # Pointer parentheticals the generic scrub can't reach: they carry words, not
  # just a problem number.
  ['\s*\(HW3 Bonus\)',                      ''],
  ['\s*\(Eq\. 3 from HW5\)',                ''],
  ['\s*\(Lemma 1\.1 from HW6\)',            ''],
  ['\s*\(cite Lemma 7\.1 from HW7\)',       ''],
  ['\s*bound from HW1\.',                   ' bound.'],
  # "(post-midterm)" is a scope label and "see midterm SIR note" a cross-ref by
  # exam scope — both name the exam to a reader who has no idea what it was.
  ['\s*\(post-midterm\)',                   ''],
  ['see midterm SIR note',                  'see the SIR and Epidemics note'],
]

# Only self-contained pointer parentheticals reach here — "(HW5 Q2)" appended to
# a lemma heading. The lemma is textbook maths; the parenthetical is the whole
# of the HW-specific part, so removing it leaves a complete sentence.
# The [\d.-]* tail covers sub-part numbering like "(HW6 Q2.3.2-3)".
scrub_regex = [
  '\s*\((?:HW|hw)\s?\d+\s*[PQ]?[\d.-]*\)',
]

# Deliberately absent from this section:
#   networks/hw/**                  — derivative of the staff solution PDFs
#   networks/Midterm Learning Guide — a walkthrough of the real midterm
#   networks/Midterm Method Index   — subsumed by the Final index
# All three are also in [denylist] so a stray include can't resurrect them.


# ─── Machine Learning ────────────────────────────────────────────────────────
# S1/S2 held back: a framework whose worked example is empty, and a to-do list
# with an empty python block. The other 11 are substantive.
[[section]]
title   = "Machine Learning"
slug    = "machine-learning"
vault   = "python"
include = [
  "ml/01 Probability.md",
  "ml/02 MLE & MAP.md",
  "ml/03 Linear Regression & Regularization.md",
  "ml/04 Clustering.md",
  "ml/05 Classifiers.md",
  "ml/06 Optimization.md",
  "ml/07 Neural Networks.md",
  "ml/08 CNNs & ResNet.md",
  "ml/09 Transformers & Attention.md",
  "ml/10 Language Models.md",
  "ml/11 Self-Supervised Learning.md",
]
# "## Notes" is the one genuinely empty section (a single "- " bullet).
# "## → add must-knows to [[ML]]" is the porting checklist footer.
strip_headings = ["## Notes", "## → add must-knows to [[ML]]"]

# `- [ ]` here is a study artifact wrapped around real content, not an unfinished
# task list: the Subtopics sections ARE the substance of these notes. Published
# as checkboxes they read as abandoned; deboxing turns "- [ ] x" into "- x".
debox = true

# The breadcrumb line also carries `ref: attention_is_all_you_need.pdf`, which
# points at a denylisted PDF. Nav replaces the breadcrumb; link arXiv if the
# reference is wanted back.
drop_lines_matching = [
  '\[\[_ML Index',
]

# These parentheticals annotate where content came from — a paper cheatsheet, a
# margin in a handwritten notebook, an Obsidian mechanic. Deliberately scrubbed
# here rather than deleted from the vault: in Obsidian they tell you which
# source a section came from, which is worth keeping. They just mean nothing to
# a reader who has never seen the notebook.
scrub_regex = [
  '\s*\((?:from )?(?:your |the )?cheatsheet[^)]*\)',   # "(cheatsheet §9.1)", "(from cheatsheet §2)"
  '\s*\(from your [^)]*\)',                            # "(from your red notes)"
  '\s*\(collapse = flashcard\)',                       # an Obsidian mechanic
]


